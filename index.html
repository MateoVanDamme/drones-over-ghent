<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Fly Over Gent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading">Loading city tiles...</div>

    <div id="controls-overlay" class="debug-info">
        <div class="overlay-hint">Press <kbd>I</kbd> to hide</div>
        <h3>Controls</h3>
        <div class="controls-grid">
            <kbd>1 2 3 4</kbd><span>Camera: follow / chase / orbit / manual</span>
            <kbd>Tab</kbd><span>Cycle to next drone</span>
            <kbd>WASD</kbd><span>Move (manual mode)</span>
            <kbd>Space / Shift</kbd><span>Fly up / down</span>
            <kbd>Mouse</kbd><span>Look around</span>
            <kbd>I</kbd><span>Toggle UI</span>
            <kbd>P</kbd><span>Respawn drones</span>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
        }
    }
    </script>

    <script type="module" src="main.js"></script>
</body>
</html>
